name: CI
on: [push, pull_request]
permissions: {contents: read}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.x', cache: true}
      - uses: actions/setup-node@v4
        with: {node-version: '24', cache: npm, cache-dependency-path: web/package-lock.json}
      - run: npm ci --ignore-scripts
        working-directory: web
      - run: npm audit --audit-level=high
        working-directory: web
      - run: npm run typecheck && npm test && npm run build
        working-directory: web
      - run: gofmt -w cmd internal migrations web/embed.go && git diff --exit-code
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: mkdir -p bin && CGO_ENABLED=0 go build -o bin/cortasentry ./cmd/cortasentry
      - run: ./scripts/smoke-test.sh

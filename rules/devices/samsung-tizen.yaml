schema_version: 1
id: device.samsung.tizen-tv
version: 1.0.0
status: active
device_class: television
vendor: Samsung
product_family: Tizen TV
required:
  - {source_type: http, field_path: http.title, operator: contains, value: Samsung, weight: 0, explanation: Samsung title required}
positive:
  - {source_type: http, field_path: http.title, operator: contains, value: SmartTV, weight: 0.5, explanation: HTTP title names SmartTV}
  - {source_type: mdns, field_path: mdns.service, operator: equals, value: _samsungmsf._tcp, weight: 0.4, explanation: Samsung MSF service advertised}
negative:
  - {source_type: http, field_path: http.title, operator: contains, value: emulator, weight: 0.3, explanation: Emulator marker reduces confidence}
explanation: Evidence is consistent with a Samsung Tizen television; exact model requires model-specific evidence.
author: CortaSentry contributors
source: Built-in illustrative rule
created_at: 2026-07-12
updated_at: 2026-07-12
tests:
  - name: samsung-title
    should_match: true
    source_type: http
    fields: {http.title: Samsung SmartTV}
  - name: unrelated-title
    should_match: false
    source_type: http
    fields: {http.title: Generic Router}
